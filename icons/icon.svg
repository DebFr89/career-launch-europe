<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Debanjan Patra — rising career trajectory mark">
  <defs>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#34E1FF"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34E1FF" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#34E1FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ground -->
  <rect width="512" height="512" rx="112" fill="#070C14"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#21385E" stroke-width="3"/>

  <!-- area under the trajectory -->
  <path d="M96 392 L188 332 L268 350 L344 232 L416 132 L416 416 L96 416 Z" fill="url(#area)"/>

  <!-- rising trajectory line -->
  <path d="M96 392 L188 332 L268 350 L344 232 L416 132"
        fill="none" stroke="url(#sig)" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- milestone nodes -->
  <g fill="#0C1626" stroke="#34E1FF" stroke-width="6">
    <circle cx="96"  cy="392" r="11"/>
    <circle cx="188" cy="332" r="11"/>
    <circle cx="268" cy="350" r="11"/>
    <circle cx="344" cy="232" r="11"/>
  </g>
  <!-- endpoint (arrival) -->
  <circle cx="416" cy="132" r="20" fill="#34E1FF" filter="url(#glow)"/>
  <circle cx="416" cy="132" r="20" fill="none" stroke="#E8F0FB" stroke-width="4"/>
</svg>
