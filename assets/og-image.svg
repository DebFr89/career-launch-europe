<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="sig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#34E1FF"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34E1FF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34E1FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="78%" cy="32%" r="55%">
      <stop offset="0" stop-color="#172A49" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#070C14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full square ground (rasterizes cleanly square-in/square-out) -->
  <rect width="1200" height="1200" fill="#070C14"/>

  <!-- design lives in the centre 1200x630 band (y 285..915); crop recovers it exactly -->
  <g transform="translate(0,285)">
    <rect width="1200" height="630" fill="url(#halo)"/>

    <!-- trajectory motif, right side -->
    <g transform="translate(40,0)">
      <path d="M690 470 L800 410 L880 430 L980 300 L1110 150 L1110 540 L690 540 Z" fill="url(#area)"/>
      <path d="M690 470 L800 410 L880 430 L980 300 L1110 150" fill="none"
            stroke="url(#sig)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#0C1626" stroke="#34E1FF" stroke-width="4">
        <circle cx="690" cy="470" r="8"/><circle cx="800" cy="410" r="8"/>
        <circle cx="880" cy="430" r="8"/><circle cx="980" cy="300" r="8"/>
      </g>
      <circle cx="1110" cy="150" r="14" fill="#34E1FF"/>
    </g>

    <!-- text block -->
    <text x="90" y="150" fill="#34E1FF" font-size="26" font-weight="700" letter-spacing="4">CAREER COACHING · FRANCE &amp; EUROPE</text>
    <text x="86" y="270" fill="#E8F0FB" font-size="86" font-weight="800" letter-spacing="-2">Land your next role</text>
    <text x="86" y="365" fill="#E8F0FB" font-size="86" font-weight="800" letter-spacing="-2">in Europe.</text>
    <text x="90" y="430" fill="#93A8C9" font-size="34" font-weight="400">Without learning the rules the hard way.</text>

    <line x1="92" y1="500" x2="92" y2="556" stroke="#FFB454" stroke-width="5"/>
    <text x="116" y="525" fill="#E8F0FB" font-size="30" font-weight="700">Debanjan Patra</text>
    <text x="116" y="558" fill="#5E7298" font-size="24" font-weight="400">The Europe Launch Method · Paris &amp; EMEA</text>
  </g>
</svg>
